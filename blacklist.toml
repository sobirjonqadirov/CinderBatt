# CinderBatt Blacklist
# Add any .exe name you want killed when restriction mode is active

[blacklist]
apps = [
    "steam.exe",
    "steamwebhelper.exe",
    "discord.exe",
    "wallpaper32.exe",
    "wallpaper64.exe",
    "EpicGamesLauncher.exe",
    "GalaxyClient.exe",
    "upc.exe",
    "origin.exe",
    "SpotifyWebHelper.exe",
]

[options]
# Set to true to also kill child processes (e.g. games launched by Steam)
kill_process_tree = true